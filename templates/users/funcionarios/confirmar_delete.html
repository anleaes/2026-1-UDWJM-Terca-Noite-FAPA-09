{% extends 'base.html' %}

{% block title %}
Deletar Funcionário
{% endblock title %}

{% block body %}

<h1>Deletar Funcionário</h1>

<p>Tem certeza que deseja deletar o funcionário "{{ funcionario.nome }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
</form>

<p>
    <a href="{% url 'users_web:funcionarios_listar' %}">Cancelar</a>
</p>

{% endblock body %}
