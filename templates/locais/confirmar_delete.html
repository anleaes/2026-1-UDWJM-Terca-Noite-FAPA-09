{% extends 'base.html' %}

{% block title %}
Deletar Local
{% endblock title %}

{% block body %}

<h1>Deletar Local</h1>

<p>Tem certeza que deseja deletar o local "{{ local.nome }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
</form>

<p>
    <a href="{% url 'locais:listar' %}">Cancelar</a>
</p>

{% endblock body %}
