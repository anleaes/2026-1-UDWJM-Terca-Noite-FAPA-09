{% extends 'base.html' %}

{% block title %}
Excluir Manutencao
{% endblock title %}

{% block body %}

<h1>Excluir Manutencao</h1>

<p>Tem certeza que deseja excluir a manutencao #{{ manutencao.id }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusao</button>
</form>

<p>
    <a href="{% url 'manutencao_web:lista' %}">Cancelar</a>
</p>

{% endblock body %}
