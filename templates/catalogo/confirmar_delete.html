{% extends 'base.html' %}

{% block title %}
Deletar do Catálogo
{% endblock title %}

{% block body %}

<h1>Deletar do Catálogo</h1>

<p>Tem certeza que deseja deletar o item do catálogo "{{ catalogo.veiculo }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
</form>

<p>
    <a href="{% url 'catalogo_web:listar' %}">Cancelar</a>
</p>

{% endblock body %}
