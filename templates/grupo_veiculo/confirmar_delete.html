{% extends 'base.html' %}

{% block title %}
Deletar Grupo de Veículo
{% endblock title %}

{% block body %}

<h1>Deletar Grupo de Veículo</h1>

<p>Tem certeza que deseja deletar o grupo "{{ grupo.nome }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
</form>

<p>
    <a href="{% url 'grupo_veiculo_web:listar' %}">Cancelar</a>
</p>

{% endblock body %}
