{% extends 'base.html' %}

{% block title %}
Deletar Veículo
{% endblock title %}

{% block body %}

<h1>Deletar Veículo</h1>

<p>Tem certeza que deseja deletar o veículo "{{ veiculo.marca }} {{ veiculo.modelo }} - {{ veiculo.placa }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
</form>

<p>
    <a href="{% url 'veiculo_web:listar' %}">Cancelar</a>
</p>

{% endblock body %}
