{% extends 'base.html' %}

{% block title %}
Finalizar Alocacao
{% endblock title %}

{% block body %}

<h1>Finalizar Alocacao #{{ alocacao.id }}</h1>

<p><strong>Solicitacao:</strong> {{ alocacao.solicitacao }}</p>
<p><strong>KM inicial:</strong> {{ alocacao.km_inicial }}</p>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Finalizar</button>
</form>

<p>
    <a href="{% url 'alocacao_web:detalhe' alocacao.pk %}">Voltar</a>
</p>

{% endblock body %}
